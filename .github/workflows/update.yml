name: Update Scoop Radar README

on:
  schedule:
    - cron: '0 * * * *' # Run hourly
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'maintenance/**'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache crawler data
        uses: actions/cache@v4
        with:
          path: |
            maintenance/cache
            maintenance/cache.pickle
          key: ${{ runner.os }}-crawler-cache-${{ hashFiles('maintenance/github_crawler.py') }}
          restore-keys: |
            ${{ runner.os }}-crawler-cache-

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run scoop-radar-updater

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated README update [ci skip]"
          file_pattern: README.md
